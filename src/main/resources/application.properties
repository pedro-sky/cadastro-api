# ==========================================
# CONFIGURAÇÕES DA APLICAÇÃO
# ==========================================

# Nome da aplicação
spring.application.name=cadastro-api

# Porta do servidor (padrão é 8080)
server.port=8080

# ==========================================
# BANCO DE DADOS H2 (em memória)
# ==========================================

# URL do banco H2 em memória — os dados são perdidos ao reiniciar
spring.datasource.url=jdbc:h2:mem:cadastrodb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilita o console web do H2 — acesse em: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / HIBERNATE
# ==========================================

# Estratégia de criação de tabelas:
# create-drop → cria ao iniciar e deleta ao encerrar (bom para dev/estudo)
# update      → atualiza o schema sem apagar dados
# validate    → apenas valida, não altera nada
spring.jpa.hibernate.ddl-auto=create-drop

# Exibe as queries SQL no console (útil para aprender o que o JPA gera)
spring.jpa.show-sql=true

# Formata as queries para facilitar leitura
spring.jpa.properties.hibernate.format_sql=true

# Dialeto do banco de dados
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
